services:
  api:
    extends:
      file: docker-compose.yaml
      service: api
    environment:
      - VLLM_CHAT_BASE_URL=${VLLM_CHAT_BASE_URL:-http://litellm-gateway:8010/queue}
      - VLLM_EMBED_BASE_URL=${VLLM_EMBED_BASE_URL:-http://litellm-gateway:8010/v1/embeddings}
      - VLLM_RERANK_BASE_URL=${VLLM_RERANK_BASE_URL:-http://litellm-gateway:8010/v1/rerank}
    command:
      - /bin/sh
      - -c
      - >
        WORKERS=$(( $(nproc) / 2 )); if [ "$$WORKERS" -lt 1 ]; then WORKERS=1; fi;
        exec uvicorn server.main:app --host 0.0.0.0 --port 5050 --workers "$$WORKERS" --loop uvloop --http httptools

    shm_size: 8g
    ipc: host
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      memlock:
        soft: -1
        hard: -1
