services:
  api:
    build: null
    image: registry.cn-beijing.aliyuncs.com/wyhy/mirrors:yuxi-api-0.5.dev
    pull_policy: always
    volumes:
      - ./saves:/app/saves
      - ./.env:/app/.env
      - ${MODEL_DIR:-./models}:/models
    command: uvicorn server.main:app --host 0.0.0.0 --port 5050

    shm_size: 8g
    ipc: host
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      memlock:
        soft: -1
        hard: -1
  crawler:
    build: null
    image: registry.cn-beijing.aliyuncs.com/wyhy/mirrors:yuxi-crawler-0.1.dev
    pull_policy: always
    volumes:
      - ./.env:/app/.env
      - ./crawler_data:/app/data
    environment:
      - CRAWLER_DATABASE_URL=${CRAWLER_DATABASE_URL:-sqlite+aiosqlite:////app/data/crawler.db}
    command: sh -c "mkdir -p /app/data && uvicorn main:app --host 0.0.0.0 --port 5060"

    shm_size: 8g
    ipc: host
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      memlock:
        soft: -1
        hard: -1
  crawler-worker:
    image: registry.cn-beijing.aliyuncs.com/wyhy/mirrors:yuxi-crawler-0.1.dev
    pull_policy: always
    volumes:
      - ./.env:/app/.env
      - ./crawler_data:/app/data
    environment:
      - CRAWLER_DATABASE_URL=${CRAWLER_DATABASE_URL:-sqlite+aiosqlite:////app/data/crawler.db}
    command: sh -c "mkdir -p /app/data && celery -A core.celery_app.celery_app worker --loglevel=info --concurrency=2"

    shm_size: 8g
    ipc: host
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      memlock:
        soft: -1
        hard: -1
  web:
    build: null
    image: registry.cn-beijing.aliyuncs.com/wyhy/mirrors:yuxi-web-0.5.dev
    pull_policy: always
    volumes: []
    depends_on:
      - api
      - crawler
    command: null
    shm_size: 8g
    ipc: host
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      memlock:
        soft: -1
        hard: -1
