services:
  api:
    extends:
      file: docker-compose.yaml
      service: api
    environment:
      - VLLM_CHAT_BASE_URL=${VLLM_CHAT_BASE_URL:-http://litellm-gateway:8010/v1}
      - VLLM_EMBED_BASE_URL=${VLLM_EMBED_BASE_URL:-http://litellm-gateway:8010/v1/embeddings}
      - VLLM_RERANK_BASE_URL=${VLLM_RERANK_BASE_URL:-http://litellm-gateway:8010/v1/rerank}

  crawler:
    extends:
      file: docker-compose.yaml
      service: crawler

  crawler-worker:
    extends:
      file: docker-compose.yaml
      service: crawler-worker

  crawler-redis:
    extends:
      file: docker-compose.yaml
      service: crawler-redis

  web:
    extends:
      file: docker-compose.yaml
      service: web

  graph:
    extends:
      file: docker-compose.yaml
      service: graph

  etcd:
    extends:
      file: docker-compose.yaml
      service: etcd

  minio:
    extends:
      file: docker-compose.yaml
      service: minio

  milvus:
    extends:
      file: docker-compose.yaml
      service: milvus

  postgres:
    extends:
      file: docker-compose.yaml
      service: postgres

  litellm-gateway:
    build:
      context: .
      dockerfile: docker/litellm.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    image: ${LITELLM_IMAGE:-litellm-proxy:cn}
    container_name: litellm-gateway
    command:
      - --config
      - /app/config.yaml
      - --port
      - "8010"
    volumes:
      - ./docker/litellm.qwen35.yaml:/app/config.yaml:ro
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8010/health/readiness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20s
    depends_on:
      - vllm-qwen35-35b-a3b-fp8
      - vllm-qwen3-embedding-cpu
      - vllm-qwen3-rerank-cpu
    networks:
      - app-network
    restart: unless-stopped

  vllm-qwen35-35b-a3b-fp8:
    image: ${VLLM_OPENAI_IMAGE:-docker.m.daocloud.io/vllm/vllm-openai:latest}
    container_name: vllm-qwen35-35b-a3b-fp8
    command:
      - --model
      - /models/Qwen/Qwen3.5-35B-A3B-FP8
      - --served-model-name
      - Qwen3.5-35B-A3B-FP8
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - "2"
      - --dtype
      - auto
      - --gpu-memory-utilization
      - "0.90"
      - --max-model-len
      - "24576"
      - --max-num-seqs
      - "12"
      - --max-num-batched-tokens
      - "24576"
      - --trust-remote-code
    volumes:
      - ${MODEL_DIR:-./models}:/models
      - ./docker/volumes/vllm/hf-cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0", "1"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 300s
    networks:
      - app-network
    restart: unless-stopped

  vllm-qwen3-embedding-cpu:
    image: ${VLLM_OPENAI_CPU_IMAGE:-docker.m.daocloud.io/vllm/vllm-openai-cpu:latest}
    container_name: vllm-qwen3-embedding-cpu
    command:
      - --model
      - /models/Qwen/Qwen3-Embedding-0.6B
      - --served-model-name
      - Qwen3-Embedding-0.6B
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --max-model-len
      - "4096"
      - --trust-remote-code
    environment:
      - CUDA_VISIBLE_DEVICES=
    volumes:
      - ${MODEL_DIR:-./models}:/models
      - ./docker/volumes/vllm/hf-cache:/root/.cache/huggingface
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 120s
    networks:
      - app-network
    restart: unless-stopped

  vllm-qwen3-rerank-cpu:
    image: ${VLLM_OPENAI_CPU_IMAGE:-docker.m.daocloud.io/vllm/vllm-openai-cpu:latest}
    container_name: vllm-qwen3-rerank-cpu
    command:
      - --model
      - /models/Qwen/Qwen3-Reranker-0.6B
      - --served-model-name
      - qwen3-rerank
      - --host
      - 0.0.0.0
      - --port
      - "8002"
      - --max-model-len
      - "4096"
      - --trust-remote-code
    environment:
      - CUDA_VISIBLE_DEVICES=
    volumes:
      - ${MODEL_DIR:-./models}:/models
      - ./docker/volumes/vllm/hf-cache:/root/.cache/huggingface
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 120s
    networks:
      - app-network
    restart: unless-stopped

  paddlex:
    build:
      context: .
      dockerfile: docker/paddlex.Dockerfile
    image: paddlex:latest
    container_name: paddlex-ocr
    volumes:
      - ./docker/volumes/paddlex:/paddlex
      - ${MODEL_DIR:-./models}/PaddleX:/root/.paddlex
    ports:
      - "8080:8080"
    environment:
      - CUDA_VISIBLE_DEVICES=
    command:
      - paddlex
      - --serve
      - --pipeline
      - PP-StructureV3.yaml
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --device
      - cpu
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 90s
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
